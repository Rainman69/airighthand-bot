name = "airighthand-bot"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# ───────────── KV: short-term cache, rate-limit, account cooldowns ─────────────
[[kv_namespaces]]
binding = "KV"
id = "f9004ee58bc044419fd1c073ee519bd7"
preview_id = "d30f7b3c08994d2c880283feeb629c10"

# ───────────── D1: users, chats, memory, reminders, usage ─────────────
[[d1_databases]]
binding = "DB"
database_name = "airighthand"
database_id = "6fdb32d1-bb32-4cfa-b8ba-dfcf56c4eef7"

# ───────────── R2: cache for generated images / audio (optional, disabled) ─────
# R2 is not currently used by the code — it's reserved for future media caching.
# Re-enable by uncommenting once R2 is activated on the account.
# [[r2_buckets]]
# binding = "MEDIA"
# bucket_name = "airighthand-media"

# ───────────── Cron: due-reminder dispatcher ─────────────
[triggers]
crons = ["* * * * *"]

# ───────────── Observability ─────────────
[observability]
enabled = true

# ───────────── Secrets (set with `wrangler secret put`) ─────────────
# TELEGRAM_BOT_TOKEN              — bot token from @BotFather
# TELEGRAM_WEBHOOK_SECRET         — random 32-byte hex used as Telegram secret_token
# CF_ACCOUNTS_JSON                — JSON array [{"id":"…","token":"…"}, …] of Cloudflare AI accounts
# OWNER_ID                        — Telegram user ID of the bot owner
# TELEGRAM_PAYMENT_PROVIDER_TOKEN — optional, for fiat payments
